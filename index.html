<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Courses Pro - V21</title>
    <style>
        :root { --primary: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --bg: #f8f9fa; --blue: #3498db; --gray-dark: #7f8c8d; --orange: #f39c12; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; background: var(--bg);
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* BANDEAU SUPÉRIEUR IMMOBILE */
        .fixed-header {
            flex-shrink: 0; background: var(--bg); padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 9999;
        }
        
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; 
            background: var(--dark); color: white; padding: 12px; 
            border-radius: 10px; text-align: center; max-width: 980px; margin: auto;
        }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.8; }

        .admin-section { flex-shrink: 0; max-width: 1000px; margin: 0 auto; width: 100%; }
        .admin-card { background: #f1f1f1; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #ddd; }

        /* ZONE SCROLLABLE */
        .scrollable-content {
            flex-grow: 1; overflow-y: auto; padding-bottom: 50px;
            max-width: 1000px; margin: 0 auto; width: 100%; -webkit-overflow-scrolling: touch;
        }

        .input-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-end; flex-wrap: wrap; }
        .col { display: flex; flex-direction: column; flex: 1; min-width: 120px; position: relative; }
        label { font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; width: 100%; box-sizing: border-box; height: 42px; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; height: 42px; white-space: nowrap; }
        .btn-ok { background: var(--primary); }
        .btn-blue { background: var(--blue); }

        /* MAGASINS */
        .shop-area { margin: 20px 10px; border: 1px solid #ccc; border-radius: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .shop-title-bar { 
            background: #eee; padding: 12px 15px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #ccc; position: sticky; top: 0; z-index: 100;
        }
        
        .shop-actions { display: flex; gap: 8px; align-items: center; }
        .badge { padding: 4px 8px; border-radius: 5px; color: white; font-size: 0.8rem; font-weight: bold; min-width: 60px; text-align: center; }
        .bg-gray { background: var(--gray-dark); }
        .bg-green { background: var(--primary); }
        .btn-clear-shop { background: none; border: none; color: var(--orange); cursor: pointer; font-size: 1.2rem; padding: 0 5px; }

        /* ARTICLES */
        .item-row { 
            display: grid; grid-template-columns: 40px 1fr 130px 130px 80px 40px; 
            align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; 
        }
        .is-checked { background: #f9f9f9; opacity: 0.6; }
        .is-checked .name { text-decoration: line-through; color: #888; }
        .name { font-weight: 600; font-size: 1rem; cursor: pointer; }

        /* REDUCTION CASE A COCHER */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
        }
        
        /* QUANTITE : SANS FLECHES ET PLUS LARGE */
        .qty-ctrl { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 4px; background: white; width: fit-content; overflow: hidden; }
        .btn-q { width: 32px; height: 35px; border: none; background: #eee; cursor: pointer; font-weight: bold; }
        
        .in-q { 
            width: 60px; text-align: center; border: none; font-weight: bold; font-size: 1rem; height: 35px; 
            -moz-appearance: textfield; 
        }
        .in-q::-webkit-outer-spin-button, .in-q::-webkit-inner-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        .in-p { width: 70px; padding: 6px; text-align: right; border: 1px solid #ccc; border-radius: 4px; }
        .row-total { font-weight: bold; width: 70px; text-align: right; }
        .btn-del { background: none; border: none; color: var(--danger); font-size: 1.3rem; cursor: pointer; padding: 5px; }

        #suggestBox { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; z-index: 10000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .s-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }

        .footer-btns { display: flex; gap: 10px; padding: 10px; max-width: 1000px; margin: auto; width: 100%; box-sizing: border-box; }
        .btn-gray { background: var(--gray-dark); flex: 1; }

        @media (max-width: 650px) {
            .item-row { grid-template-columns: 35px 1fr 40px; grid-template-areas: "check name del" "extra extra extra"; gap: 5px; }
            .extra-zone { grid-area: extra; display: flex; justify-content: space-between; align-items: center; background: #fdfdfd; padding: 5px; border-radius: 5px; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="fixed-header">
        <div class="stats-grid">
            <div><span class="stat-label">Prévu</span><span id="outTotal" class="stat-val">0.00 €</span></div>
            <div><span class="stat-label">Panier</span><span id="outChecked" class="stat-val" style="color:#2ecc71">0.00 €</span></div>
            <div><span class="stat-label">Reste</span><span id="outRest" class="stat-val">0.00 €</span></div>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-card">
            <div class="input-row">
                <div class="col" style="flex:0 0 85px">
                    <label>Budget (€)</label>
                    <input type="number" id="inBudget" step="0.01" onchange="upBudget(this.value)">
                </div>
                <div class="col">
                    <label>Nouveau Magasin</label>
                    <input type="text" id="inShop" placeholder="Leclerc, Lidl...">
                </div>
                <button class="btn btn-blue" onclick="addShop()">OK</button>
            </div>
            <div class="input-row">
                <div class="col">
                    <label>Article</label>
                    <input type="text" id="inItem" placeholder="Chercher/Ajouter..." oninput="doSuggest(this.value)">
                    <div id="suggestBox"></div>
                </div>
                <div class="col" style="flex:0 0 150px">
                    <label>Magasin</label>
                    <select id="selShop"></select>
                </div>
                <button class="btn btn-ok" onclick="addItem()">OK</button>
            </div>
        </div>
        
        <div class="footer-btns">
            <button class="btn btn-gray" onclick="exportData()">💾 Sauvegarder</button>
            <button class="btn btn-gray" onclick="document.getElementById('fileIn').click()">📂 Charger</button>
            <button class="btn" style="background:var(--danger); flex:1" onclick="clearAll()">🗑️ Vider Tout</button>
            <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div class="scrollable-content" id="contentZone"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('courses_v21')) || { shops: [], budget: 0, catalogue: [] };

    function save() {
        localStorage.setItem('courses_v21', JSON.stringify(db));
        render();
    }

    function upBudget(v) { db.budget = parseFloat(v) || 0; save(); }

    function addShop() {
        const n = document.getElementById('inShop').value.trim();
        if(n) {
            db.shops.push({ id: Date.now(), name: n, items: [] });
            document.getElementById('inShop').value = "";
            save();
        }
    }

    function addItem() {
        const n = document.getElementById('inItem').value.trim();
        const sId = document.getElementById('selShop').value;
        if(!n || !sId) return;
        const shop = db.shops.find(s => s.id == sId);
        const cat = db.catalogue.find(c => c.name.toLowerCase() === n.toLowerCase());
        const price = cat ? cat.price : 0;
        shop.items.push({ id: Date.now(), name: n, qty: 1, price: price, checked: false });
        if(!cat) db.catalogue.push({ name: n, price: price });
        document.getElementById('inItem').value = "";
        save();
    }

    function doSuggest(v) {
        const box = document.getElementById('suggestBox');
        if(v.length < 1) { box.style.display = 'none'; return; }
        const hits = db.catalogue.filter(c => c.name.toLowerCase().includes(v.toLowerCase()));
        if(!hits.length) { box.style.display = 'none'; return; }
        box.innerHTML = hits.map(h => `<div class="s-item" onclick="setSug('${h.name.replace(/'/g, "\\'")}')"><span>${h.name}</span><b>${h.price.toFixed(2)}€</b></div>`).join('');
        box.style.display = 'block';
    }

    function setSug(n) { document.getElementById('inItem').value = n; document.getElementById('suggestBox').style.display = 'none'; }

    function edit(sId, iId, task, val) {
        const s = db.shops.find(x => x.id == sId);
        const it = s.items.find(x => x.id == iId);
        if(task === 'qty') it.qty = Math.max(0, parseFloat((it.qty + val).toFixed(2)));
        if(task === 'qty_m') it.qty = Math.max(0, parseFloat(val) || 0);
        if(task === 'check') it.checked = !it.checked;
        if(task === 'price') {
            it.price = parseFloat(val) || 0;
            let c = db.catalogue.find(x => x.name.toLowerCase() === it.name.toLowerCase());
            if(c) c.price = it.price;
        }
        if(task === 'del') s.items = s.items.filter(x => x.id != iId);
        save();
    }

    function clearShop(sId) {
        if(confirm("Vider les articles de ce magasin ?")) {
            const s = db.shops.find(x => x.id == sId);
            if(s) s.items = [];
            save();
        }
    }

    function delShop(id) { if(confirm("Supprimer ce magasin ?")) { db.shops = db.shops.filter(s => s.id != id); save(); } }
    function clearAll() { if(confirm("Vider toutes les listes ?")) { db.shops.forEach(s => s.items = []); save(); } }

    function render() {
        const zone = document.getElementById('contentZone');
        const sel = document.getElementById('selShop');
        const curS = sel.value;
        zone.innerHTML = "";
        sel.innerHTML = db.shops.length ? "" : '<option value="">Magasin...</option>';
        document.getElementById('inBudget').value = db.budget;

        let tG = 0, cG = 0;

        db.shops.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id; opt.textContent = s.name;
            if(s.id == curS) opt.selected = true;
            sel.appendChild(opt);

            let sSum = 0, sCheck = 0;
            let itemsHtml = s.items.map(it => {
                const sub = it.qty * it.price;
                tG += sub; if(it.checked) cG += sub;
                sSum += sub; if(it.checked) sCheck += sub;
                const isMobile = window.innerWidth < 650;
                
                const innerRow = `
                    <div class="qty-ctrl">
                        <button class="btn-q" onclick="edit(${s.id}, ${it.id}, 'qty', -1)">-</button>
                        <input type="number" step="any" class="in-q" value="${it.qty}" onchange="edit(${s.id}, ${it.id}, 'qty_m', this.value)">
                        <button class="btn-q" onclick="edit(${s.id}, ${it.id}, 'qty', 1)">+</button>
                    </div>
                    <div style="display:flex; align-items:center; gap:5px"><input type="number" class="in-p" value="${it.price||''}" onblur="edit(${s.id}, ${it.id}, 'price', this.value)">€</div>
                    <div class="row-total">${sub.toFixed(2)}€</div>
                `;

                if(!isMobile) {
                    return `<div class="item-row ${it.checked ? 'is-checked' : ''}">
                        <div><input type="checkbox" ${it.checked ? 'checked' : ''} onchange="edit(${s.id}, ${it.id}, 'check')"></div>
                        <div class="name" onclick="edit(${s.id}, ${it.id}, 'check')">${it.name}</div>
                        ${innerRow}
                        <div><button class="btn-del" onclick="edit(${s.id}, ${it.id}, 'del')">✕</button></div>
                    </div>`;
                } else {
                    return `<div class="item-row ${it.checked ? 'is-checked' : ''}">
                        <div style="grid-area:check"><input type="checkbox" ${it.checked ? 'checked' : ''} onchange="edit(${s.id}, ${it.id}, 'check')"></div>
                        <div class="name" style="grid-area:name" onclick="edit(${s.id}, ${it.id}, 'check')">${it.name}</div>
                        <div style="grid-area:del; text-align:right"><button class="btn-del" onclick="edit(${s.id}, ${it.id}, 'del')">✕</button></div>
                        <div class="extra-zone">${innerRow}</div>
                    </div>`;
                }
            }).join('');

            zone.innerHTML += `
            <div class="shop-area">
                <div class="shop-title-bar">
                    <strong>${s.name}</strong>
                    <div class="shop-actions">
                        <div class="badge bg-gray">${sSum.toFixed(2)}€</div>
                        <div class="badge bg-green">🛒 ${sCheck.toFixed(2)}€</div>
                        <button class="btn-clear-shop" onclick="clearShop(${s.id})">🗑️</button>
                        <button class="btn-del" style="font-size:1rem; margin-left:5px" onclick="delShop(${s.id})">✕</button>
                    </div>
                </div>
                <div>${itemsHtml || '<div style="padding:15px; text-align:center; color:#999">Aucun article</div>'}</div>
            </div>`;
        });

        document.getElementById('outTotal').innerText = tG.toFixed(2) + " €";
        document.getElementById('outChecked').innerText = cG.toFixed(2) + " €";
        const rem = db.budget - cG;
        const oR = document.getElementById('outRest');
        oR.innerText = rem.toFixed(2) + " €";
        oR.style.color = rem < 0 ? "red" : "#2ecc71";
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "courses.json"; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { try { db = JSON.parse(ev.target.result); save(); } catch(e) {alert("Erreur de chargement");} };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
