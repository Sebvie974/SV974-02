<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Courses Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #27ae60;
            --danger: #e74c3c;
            --promo: #f39c12;
            --dark: #2c3e50;
            --bg: #f8f9fa;
            --gray: #ecf0f1;
            --accent: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 0; color: #333; margin: 0; }

        .container { max-width: 700px; margin: auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg);
            padding: 10px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-total { 
            background: var(--dark); 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .total-box { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #444; }
        .total-box:last-child { border-right: none; }
        .total-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .total-val { font-size: 1.3rem; font-weight: bold; }
        #checked-price { color: #2ecc71; }
        #total-price { color: #bdc3c7; }

        .admin-panel { background: var(--gray); padding: 10px; border-radius: 10px; }
        .input-group { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; width: 100%; }
        .input-group:last-child { margin-bottom: 0; }
        
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        #itemInput { flex: 2; min-width: 0; }
        #shopSelect { flex: 1; min-width: 90px; max-width: 130px; font-size: 0.85rem; }
        .btn-add { flex: 0 0 auto; background: var(--primary); color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 6px; cursor: pointer; }

        .scrollable-content { padding: 15px; flex-grow: 1; }

        .json-actions { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-small { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            background: white; 
            font-size: 0.8rem; 
            font-weight: 600; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .shop-section { margin-bottom: 15px; border: 1px solid #eee; border-radius: 10px; overflow: hidden; background: #fff; }
        .shop-header { background: #eee; padding: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .shop-title { font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .shop-total-badge { background: var(--dark); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
        
        .shop-content { padding: 0 10px; }
        .collapsed .shop-content { display: none; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f1f1; gap: 8px; }
        .item-main { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .item-name { font-weight: 600; font-size: 1rem; }
        
        .controls-grid { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 8px; }
        .qty-controls { display: flex; align-items: center; background: var(--gray); border-radius: 4px; border: 1px solid #ccc; overflow: hidden; }
        .btn-qty { width: 30px; height: 30px; border: none; cursor: pointer; font-weight: bold; }
        .qty-input { width: 40px; border: none; text-align: center; font-size: 0.9rem; height: 30px; background: white; }
        
        .prices-row { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
        .price-input { width: 52px; padding: 5px; border: 1px solid #ccc; border-radius: 5px; text-align: right; font-size: 0.85rem; }
        .price-promo { border-color: var(--promo); color: var(--promo); font-weight: bold; }
        .has-promo .price-normal { text-decoration: line-through; opacity: 0.5; }

        .line-total { font-weight: bold; min-width: 60px; text-align: right; font-size: 0.95rem; }
        
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary); flex-shrink: 0; }
        .checked .item-name, .checked .line-total { text-decoration: line-through; color: #999; }
        .btn-del { background: none; border: none; color: var(--danger); font-size: 1.1rem; cursor: pointer; padding: 5px; }
        
        .arrow { font-size: 0.7rem; transition: transform 0.2s; }
        .collapsed .arrow { transform: rotate(-90deg); }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-top">
        <div class="header-total">
            <div class="total-box">
                <span class="total-label">Dans Panier</span>
                <div id="checked-price" class="total-val">0.00 €</div>
            </div>
            <div class="total-box">
                <span class="total-label">Total Prévu</span>
                <div id="total-price" class="total-val">0.00 €</div>
            </div>
        </div>

        <div class="admin-panel">
            <div class="input-group">
                <input type="text" id="shopInput" placeholder="Nouveau magasin..." style="flex: 1;">
                <button class="btn-add" onclick="addShop()" style="background: var(--accent);">+ Mag</button>
            </div>
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="Article...">
                <select id="shopSelect"></select>
                <button class="btn-add" onclick="addItemFromUI()">OK</button>
            </div>
        </div>
    </div>

    <div class="scrollable-content">
        <div class="json-actions">
            <button class="btn-small" onclick="exportJSON()">📤 Sauvegarder</button>
            <button class="btn-small" onclick="triggerImport()">📥 Charger</button>
            <input type="file" id="fileInput" accept="application/json" onchange="importJSON(event)" style="display:none">
        </div>

        <div id="masterList"></div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
        });
    }

    let data = JSON.parse(localStorage.getItem('maListeCoursesV2')) || { shops: [] };

    function saveToPhone() {
        localStorage.setItem('maListeCoursesV2', JSON.stringify(data));
    }

    function addShop(name = "") {
        const shopName = name || document.getElementById('shopInput').value.trim();
        if (!shopName) return;
        if (!data.shops.find(s => s.name === shopName)) {
            data.shops.push({ name: shopName, items: [], collapsed: false });
        }
        document.getElementById('shopInput').value = "";
        saveAndRender();
    }

    function addItemFromUI() {
        const name = document.getElementById('itemInput').value.trim();
        const shopName = document.getElementById('shopSelect').value;
        if (!name || !shopName) return;

        const shop = data.shops.find(s => s.name === shopName);
        shop.items.push({ name, qty: 1, price: 0, promo: 0, checked: false });
        document.getElementById('itemInput').value = "";
        saveAndRender();
    }

    function saveAndRender() {
        saveToPhone();
        render();
    }

    function render() {
        const master = document.getElementById('masterList');
        const select = document.getElementById('shopSelect');
        const currentShopSelection = select.value;
        
        master.innerHTML = "";
        select.innerHTML = '<option value="">Magasin...</option>';

        let grandTotal = 0;
        let checkedTotal = 0;

        data.shops.forEach((shop, sIdx) => {
            const opt = document.createElement('option');
            opt.value = shop.name; opt.innerText = shop.name;
            if(shop.name === currentShopSelection) opt.selected = true;
            select.appendChild(opt);

            const section = document.createElement('div');
            section.className = `shop-section ${shop.collapsed ? 'collapsed' : ''}`;
            
            let shopTotal = 0;
            const itemsHtml = shop.items.map((item, iIdx) => {
                const effectivePrice = (parseFloat(item.promo) > 0) ? item.promo : item.price;
                const subTotal = (parseFloat(item.qty) || 0) * (parseFloat(effectivePrice) || 0);
                
                shopTotal += subTotal;
                grandTotal += subTotal;
                if (item.checked) checkedTotal += subTotal;

                const hasPromo = parseFloat(item.promo) > 0;

                return `
                    <li class="${item.checked ? 'checked' : ''}">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem(${sIdx}, ${iIdx})">
                        <div class="item-main">
                            <span class="item-name">${item.name}</span>
                            <div class="controls-grid">
                                <div class="qty-controls">
                                    <button class="btn-qty" onclick="updateItem(${sIdx}, ${iIdx}, 'qty', -1)">-</button>
                                    <input type="number" class="qty-input" value="${item.qty}" step="any" inputmode="decimal" 
                                           onblur="updateItem(${sIdx}, ${iIdx}, 'qty_abs', this.value)" 
                                           onkeypress="if(event.key==='Enter') this.blur()">
                                    <button class="btn-qty" onclick="updateItem(${sIdx}, ${iIdx}, 'qty', 1)">+</button>
                                </div>
                                <div class="prices-row ${hasPromo ? 'has-promo' : ''}">
                                    <input type="number" class="price-input price-normal" value="${item.price || ''}" placeholder="Prix" step="0.01" inputmode="decimal"
                                           onblur="updateItem(${sIdx}, ${iIdx}, 'price', this.value)"
                                           onkeypress="if(event.key==='Enter') this.blur()">
                                    <input type="number" class="price-input price-promo" value="${item.promo || ''}" placeholder="Prom" step="0.01" inputmode="decimal"
                                           onblur="updateItem(${sIdx}, ${iIdx}, 'promo', this.value)"
                                           onkeypress="if(event.key==='Enter') this.blur()">
                                </div>
                                <div class="line-total">${subTotal.toFixed(2)}€</div>
                            </div>
                        </div>
                        <button class="btn-del" onclick="deleteItem(${sIdx}, ${iIdx})">✕</button>
                    </li>`;
            }).join('');

            section.innerHTML = `
                <div class="shop-header" onclick="toggleCollapse(${sIdx})">
                    <div class="shop-title"><span class="arrow">▼</span> ${shop.name}</div>
                    <div>
                        <span class="shop-total-badge">${shopTotal.toFixed(2)} €</span>
                        <button class="btn-del" style="font-size:0.8rem; margin-left:10px" onclick="deleteShop(event, ${sIdx})">✕</button>
                    </div>
                </div>
                <div class="shop-content"><ul>${itemsHtml}</ul></div>
            `;
            master.appendChild(section);
        });

        document.getElementById('total-price').innerText = grandTotal.toFixed(2) + " €";
        document.getElementById('checked-price').innerText = checkedTotal.toFixed(2) + " €";
    }

    function toggleCollapse(idx) { data.shops[idx].collapsed = !data.shops[idx].collapsed; saveAndRender(); }
    function toggleItem(sIdx, iIdx) { data.shops[sIdx].items[iIdx].checked = !data.shops[sIdx].items[iIdx].checked; saveAndRender(); }

    function updateItem(sIdx, iIdx, field, val) {
        const item = data.shops[sIdx].items[iIdx];
        const numVal = parseFloat(val.toString().replace(',', '.')) || 0;
        if (field === 'qty') item.qty = Math.max(0, (parseFloat(item.qty) || 0) + val);
        if (field === 'qty_abs') item.qty = Math.max(0, numVal);
        if (field === 'price') item.price = numVal;
        if (field === 'promo') item.promo = numVal;
        saveAndRender();
    }

    function deleteItem(sIdx, iIdx) { data.shops[sIdx].items.splice(iIdx, 1); saveAndRender(); }
    function deleteShop(e, idx) { e.stopPropagation(); if(confirm("Supprimer ce magasin ?")) { data.shops.splice(idx, 1); saveAndRender(); } }

    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "ma_liste_courses.json");
        dl.click();
    }

    function triggerImport() { document.getElementById('fileInput').click(); }
    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.shops) { data = imported; saveAndRender(); }
            } catch (err) { alert("Erreur fichier"); }
        };
        reader.readAsText(file);
    }

    if (data.shops.length === 0) addShop("Mon Magasin"); else render();
</script>
</body>
</html>
