<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Courses Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <style>
        :root {
            --primary: #27ae60;
            --danger: #e74c3c;
            --promo: #f39c12;
            --dark: #2c3e50;
            --bg: #f8f9fa;
            --gray: #ecf0f1;
            --accent: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 0; color: #333; margin: 0; overflow-x: hidden; }
        .container { max-width: 700px; margin: auto; background: white; min-height: 100vh; }
        
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 3000; 
            background: var(--bg);
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-total { 
            background: var(--dark); 
            color: white; 
            padding: 10px; 
            border-radius: 12px; 
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }
        .total-box { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #444; text-align: center; }
        .total-box:last-child { border-right: none; }
        .total-label { font-size: 0.55rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 2px; }
        .total-val { font-size: 1rem; font-weight: bold; }
        #checked-price { color: #2ecc71; }
        #remaining-budget { color: #3498db; }
        .over-budget { color: var(--danger) !important; }

        .admin-panel { background: var(--gray); padding: 10px; border-radius: 10px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; width: 100%; }
        
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; min-width: 0; }
        
        /* Correction largeur Nouveau Magasin */
        #budgetInput { width: 60px; font-weight: bold; flex-shrink: 0; }
        #shopInput { flex: 1; min-width: 80px; } 
        #itemInput { flex: 2; min-width: 100px; }
        #shopSelect { flex: 1; max-width: 110px; font-size: 0.8rem; }
        
        .btn-add { flex-shrink: 0; background: var(--primary); color: white; border: none; font-weight: bold; padding: 8px 12px; border-radius: 6px; cursor: pointer; }

        .scrollable-content { padding: 10px; }
        .json-actions { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-small { flex: 1; min-width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 0.75rem; font-weight: 600; cursor: pointer; }

        .shop-section { margin-bottom: 15px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        
        .shop-header { 
            position: sticky;
            z-index: 2000;
            background: #f1f1f1; 
            padding: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer;
            border-bottom: 1px solid #ddd;
            border-radius: 10px 10px 0 0;
        }

        .shop-title { font-weight: bold; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .shop-badges { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .shop-total-badge { color: white; padding: 2px 6px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .badge-all { background: var(--dark); opacity: 0.7; }
        .badge-checked { background: var(--primary); }
        
        .shop-content { padding: 0 5px; }
        .collapsed .shop-content { display: none; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f1f1; gap: 5px; }
        .item-main { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
        .item-name { font-weight: 600; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; }
        
        /* Correction Grille contrôles article */
        .controls-grid { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 5px; }
        
        /* Correction taille boutons Quantité */
        .qty-controls { display: flex; align-items: center; background: var(--gray); border-radius: 4px; border: 1px solid #ccc; overflow: hidden; flex-shrink: 0; }
        .btn-qty { width: 28px; height: 28px; border: none; cursor: pointer; font-weight: bold; background: #eee; }
        .qty-input { width: 35px; border: none; text-align: center; font-size: 0.85rem; height: 28px; background: white; padding: 0; }
        
        .prices-row { display: flex; gap: 3px; align-items: center; justify-content: flex-end; }
        .price-input { width: 48px; padding: 4px; border: 1px solid #ccc; border-radius: 5px; text-align: right; font-size: 0.8rem; }
        .price-promo { border-color: var(--promo); color: var(--promo); font-weight: bold; }
        .has-promo .price-normal { text-decoration: line-through; opacity: 0.5; }

        .line-total { font-weight: bold; min-width: 55px; text-align: right; font-size: 0.9rem; }
        
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); flex-shrink: 0; }
        .checked .item-name, .checked .line-total { text-decoration: line-through; color: #999; }
        
        .btn-icon { background: none; border: none; cursor: pointer; padding: 4px; font-size: 1rem; flex-shrink: 0; }
        .btn-del { color: var(--danger); }
        
        .arrow { font-size: 0.6rem; transition: transform 0.2s; }
        .collapsed .arrow { transform: rotate(-90deg); }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-top" id="mainHeader">
        <div class="header-total">
            <div class="total-box"><span class="total-label">Prévu</span><div id="total-price" class="total-val">0.00 €</div></div>
            <div class="total-box"><span class="total-label">Panier</span><div id="checked-price" class="total-val">0.00 €</div></div>
            <div class="total-box"><span class="total-label">Reste</span><div id="remaining-budget" class="total-val">0.00 €</div></div>
        </div>

        <div class="admin-panel">
            <div class="input-group">
                <input type="number" id="budgetInput" placeholder="Budget" inputmode="decimal" onchange="updateBudget(this.value)">
                <input type="text" id="shopInput" placeholder="Nom magasin...">
                <button class="btn-add" onclick="addShop()" style="background: var(--accent);">+ Mag</button>
            </div>
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="Article...">
                <select id="shopSelect"></select>
                <button class="btn-add" onclick="addItemFromUI()">OK</button>
            </div>
        </div>
    </div>

    <div class="scrollable-content">
        <div class="json-actions">
            <button class="btn-small" onclick="exportJSON()">💾 Export</button>
            <button class="btn-small" onclick="triggerImport()">📂 Import</button>
            <button class="btn-small" style="color:var(--danger)" onclick="clearAllItems()">🗑️ Vider</button>
            <input type="file" id="fileInput" accept="application/json" onchange="importJSON(event)" style="display:none">
        </div>
        <div id="masterList"></div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('maListeCoursesV2')) || { shops: [], budgetMax: 0 };

    function updateStickyPosition() {
        const h = document.getElementById('mainHeader').offsetHeight;
        document.querySelectorAll('.shop-header').forEach(sh => sh.style.top = h + "px");
    }

    function saveToPhone() { localStorage.setItem('maListeCoursesV2', JSON.stringify(data)); }

    function updateBudget(val) {
        data.budgetMax = parseFloat(val) || 0;
        saveAndRender();
    }

    function addShop(name = "") {
        const shopName = name || document.getElementById('shopInput').value.trim();
        if (!shopName) return;
        if (!data.shops.find(s => s.name === shopName)) {
            data.shops.push({ name: shopName, items: [], collapsed: false });
        }
        document.getElementById('shopInput').value = "";
        saveAndRender();
    }

    function addItemFromUI() {
        const name = document.getElementById('itemInput').value.trim();
        const shopName = document.getElementById('shopSelect').value;
        if (!name || !shopName) return;
        const shop = data.shops.find(s => s.name === shopName);
        shop.items.push({ name, qty: 1, price: 0, promo: 0, checked: false });
        document.getElementById('itemInput').value = "";
        saveAndRender();
    }

    function saveAndRender() {
        saveToPhone();
        render();
        updateStickyPosition();
    }

    function render() {
        const master = document.getElementById('masterList');
        const select = document.getElementById('shopSelect');
        const budgetInput = document.getElementById('budgetInput');
        const currentSelection = select.value;
        
        budgetInput.value = data.budgetMax || "";
        master.innerHTML = "";
        select.innerHTML = '<option value="">Magasin...</option>';

        let grandTotal = 0, checkedTotalGlobal = 0;

        data.shops.forEach((shop, sIdx) => {
            const opt = document.createElement('option');
            opt.value = shop.name; opt.innerText = shop.name;
            if(shop.name === currentSelection) opt.selected = true;
            select.appendChild(opt);

            const section = document.createElement('div');
            section.className = `shop-section ${shop.collapsed ? 'collapsed' : ''}`;
            
            let shopTotalPrevu = 0, shopTotalChecked = 0;

            const itemsHtml = shop.items.map((item, iIdx) => {
                const effPrice = (parseFloat(item.promo) > 0) ? item.promo : item.price;
                const subTotal = (parseFloat(item.qty) || 0) * (parseFloat(effPrice) || 0);
                shopTotalPrevu += subTotal;
                grandTotal += subTotal;
                if (item.checked) { shopTotalChecked += subTotal; checkedTotalGlobal += subTotal; }
                const hasPromo = parseFloat(item.promo) > 0;

                return `
                    <li class="${item.checked ? 'checked' : ''}">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem(${sIdx}, ${iIdx})">
                        <div class="item-main">
                            <span class="item-name" onclick="editItemName(${sIdx}, ${iIdx})">${item.name}</span>
                            <div class="controls-grid">
                                <div class="qty-controls">
                                    <button class="btn-qty" onclick="updateItem(${sIdx}, ${iIdx}, 'qty', -1)">-</button>
                                    <input type="number" class="qty-input" value="${item.qty}" step="any" inputmode="decimal" onblur="updateItem(${sIdx}, ${iIdx}, 'qty_abs', this.value)">
                                    <button class="btn-qty" onclick="updateItem(${sIdx}, ${iIdx}, 'qty', 1)">+</button>
                                </div>
                                <div class="prices-row ${hasPromo ? 'has-promo' : ''}">
                                    <input type="number" class="price-input price-normal" value="${item.price || ''}" placeholder="0" step="0.01" inputmode="decimal" onblur="updateItem(${sIdx}, ${iIdx}, 'price', this.value)">
                                    <input type="number" class="price-input price-promo" value="${item.promo || ''}" placeholder="%" step="0.01" inputmode="decimal" onblur="updateItem(${sIdx}, ${iIdx}, 'promo', this.value)">
                                </div>
                                <div class="line-total">${subTotal.toFixed(2)}€</div>
                            </div>
                        </div>
                        <button class="btn-icon btn-del" onclick="deleteItem(${sIdx}, ${iIdx})">✕</button>
                    </li>`;
            }).join('');

            section.innerHTML = `
                <div class="shop-header" onclick="toggleCollapse(${sIdx})">
                    <div class="shop-title"><span class="arrow">▼</span> ${shop.name}</div>
                    <div class="shop-badges">
                        <span class="shop-total-badge badge-all">${shopTotalPrevu.toFixed(2)}€</span>
                        <span class="shop-total-badge badge-checked">🛒 ${shopTotalChecked.toFixed(2)}€</span>
                        <button class="btn-icon btn-del" onclick="deleteShop(event, ${sIdx})" style="color:#666">✕</button>
                    </div>
                </div>
                <div class="shop-content"><ul>${itemsHtml}</ul></div>
            `;
            master.appendChild(section);
        });

        const remaining = data.budgetMax - checkedTotalGlobal;
        document.getElementById('total-price').innerText = grandTotal.toFixed(2) + " €";
        document.getElementById('checked-price').innerText = checkedTotalGlobal.toFixed(2) + " €";
        const remEl = document.getElementById('remaining-budget');
        remEl.innerText = remaining.toFixed(2) + " €";
        if (remaining < 0) remEl.classList.add('over-budget'); else remEl.classList.remove('over-budget');
    }

    function toggleCollapse(idx) { data.shops[idx].collapsed = !data.shops[idx].collapsed; saveAndRender(); }
    function toggleItem(sIdx, iIdx) { data.shops[sIdx].items[iIdx].checked = !data.shops[sIdx].items[iIdx].checked; saveAndRender(); }
    function deleteItem(sIdx, iIdx) { data.shops[sIdx].items.splice(iIdx, 1); saveAndRender(); }
    function deleteShop(e, idx) { e.stopPropagation(); if(confirm("Supprimer le magasin ?")) { data.shops.splice(idx, 1); saveAndRender(); } }
    function clearAllItems() { if(confirm("Tout vider ?")) { data.shops.forEach(s => s.items = []); saveAndRender(); } }
    function editItemName(sIdx, iIdx) { const n = prompt("Nom ?", data.shops[sIdx].items[iIdx].name); if(n) { data.shops[sIdx].items[iIdx].name = n; saveAndRender(); } }

    function updateItem(sIdx, iIdx, field, val) {
        const item = data.shops[sIdx].items[iIdx];
        const n = parseFloat(val.toString().replace(',', '.')) || 0;
        if (field === 'qty') item.qty = Math.max(0, (parseFloat(item.qty) || 0) + val);
        if (field === 'qty_abs') item.qty = Math.max(0, n);
        if (field === 'price') item.price = n;
        if (field === 'promo') item.promo = n;
        saveAndRender();
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "courses.json"; a.click();
    }

    function triggerImport() { document.getElementById('fileInput').click(); }
    function importJSON(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = res => { try { data = JSON.parse(res.target.result); saveAndRender(); } catch(e){alert("Erreur fichier");} };
        reader.readAsText(file);
    }

    window.addEventListener('resize', updateStickyPosition);
    if (data.shops.length === 0) addShop("Mon Magasin"); else render();
    setTimeout(updateStickyPosition, 150);
</script>
</body>
</html>
