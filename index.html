<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Courses Pro">
    <meta name="theme-color" content="#2c3e50">
    
    <title>Mes Courses Pro - V32 Comparateur</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --bg: #f8f9fa; --blue: #3498db; --gray-dark: #7f8c8d; --orange: #f39c12; --promo-color: #9b59b6; }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--dark); padding: 20px; box-sizing: border-box; }
        .auth-card { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-card h2 { margin-top: 0; color: var(--dark); text-align: center; margin-bottom: 20px; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .auth-tab.active { background: var(--blue); color: white; }

        .fixed-header { flex-shrink: 0; background: var(--bg); padding: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 9999; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--dark); color: white; padding: 10px; border-radius: 8px; text-align: center; max-width: 980px; margin: auto; }
        .stat-val { font-size: 1rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.55rem; text-transform: uppercase; opacity: 0.8; }

        .admin-section { flex-shrink: 0; max-width: 1000px; margin: 0 auto; width: 100%; }
        .admin-card { background: #f1f1f1; padding: 12px; margin: 8px; border-radius: 8px; border: 1px solid #ddd; }

        .scrollable-content { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; max-width: 1000px; margin: 0 auto; width: 100%; -webkit-overflow-scrolling: touch; }

        .input-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: flex-end; flex-wrap: wrap; }
        .col { display: flex; flex-direction: column; flex: 1; min-width: 110px; position: relative; }
        label { font-size: 0.65rem; font-weight: bold; margin-bottom: 2px; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; width: 100%; box-sizing: border-box; height: 38px; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; height: 38px; white-space: nowrap; font-size: 0.85rem; }
        .btn-ok { background: var(--primary); }
        .btn-blue { background: var(--blue); }
        .btn-orange { background: var(--orange); }

        .shop-area { margin: 10px 8px; border: 1px solid #ccc; border-radius: 8px; background: white; }
        .shop-title-bar { background: #eee; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; position: sticky; top: 0; z-index: 100; }
        .badge { padding: 3px 6px; border-radius: 4px; color: white; font-size: 0.75rem; font-weight: bold; min-width: 50px; text-align: center; }
        .bg-gray { background: var(--gray-dark); }
        .bg-green { background: var(--primary); }

        .item-row { display: grid; grid-template-columns: 30px 1fr 110px 75px 75px 65px 30px; align-items: center; padding: 5px 8px; border-bottom: 1px solid #eee; gap: 6px; }
        .is-checked { background: #f9f9f9; opacity: 0.6; }
        .is-checked .name { text-decoration: line-through; color: #888; }
        .name { font-weight: 600; font-size: 0.85rem; cursor: pointer; }

        input[type="checkbox"] { width: 15px; height: 15px; }
        .qty-ctrl { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 4px; background: white; overflow: hidden; scale: 0.9; }
        .btn-q { width: 28px; height: 30px; border: none; background: #eee; cursor: pointer; font-weight: bold; }
        .in-q { width: 45px; text-align: center; border: none; font-weight: bold; font-size: 0.85rem; height: 30px; -moz-appearance: textfield;}
        .in-q::-webkit-outer-spin-button, .in-q::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .in-p { width: 60px; padding: 4px; text-align: right; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
        .in-promo { border-color: var(--promo-color); color: var(--promo-color); }
        .row-total { font-weight: bold; width: 60px; text-align: right; font-size: 0.85rem; }
        .btn-del { background: none; border: none; color: var(--danger); font-size: 1.1rem; cursor: pointer; padding: 0 4px;}

        #suggestBox { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; z-index: 10000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .s-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; }

        @media (max-width: 750px) {
            .item-row { display: flex; flex-direction: column; align-items: stretch; padding: 8px; gap: 6px; }
            .mobile-top-line { display: flex; align-items: center; gap: 8px; }
            .mobile-bottom-line { display: grid; grid-template-columns: auto 1fr 1fr auto; align-items: center; gap: 5px; background: #f4f4f4; padding: 5px; border-radius: 6px; }
            .name { font-size: 0.9rem; flex-grow: 1; }
        }
    </style>
</head>
<body>

<!-- AUTHENTIFICATION -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <h2 id="authTitle">Connexion</h2>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="setAuthMode('login')">Se connecter</button>
            <button class="auth-tab" id="tabRegister" onclick="setAuthMode('register')">S'inscrire</button>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input type="email" id="authEmail" placeholder="Adresse e-mail">
            <input type="password" id="authPassword" placeholder="Mot de passe">
            <button class="btn btn-blue" id="authSubmit" onclick="handleAuth()" style="width:100%">Valider</button>
            <button class="btn" style="background:none; color:var(--blue); font-size:0.8rem;" id="btnForgot" onclick="handleForgotPassword()">Mot de passe oublié ?</button>
        </div>
    </div>
</div>

<!-- APPLICATION -->
<div id="appScreen" class="app-wrapper" style="display:none;">
    <div class="fixed-header">
        <div class="stats-grid">
            <div><span class="stat-label">Prévu</span><span id="outTotal" class="stat-val">0.00 €</span></div>
            <div><span class="stat-label">Panier</span><span id="outChecked" class="stat-val" style="color:#2ecc71">0.00 €</span></div>
            <div><span class="stat-label">Reste</span><span id="outRest" class="stat-val">0.00 €</span></div>
        </div>
    </div>

    <div class="admin-section">
        <div class="admin-card">
            <div class="input-row">
                <div class="col" style="flex:0 0 80px">
                    <label>Budget (€)</label>
                    <input type="number" id="inBudget" step="0.01" onchange="upBudget(this.value)">
                </div>
                <div class="col">
                    <label>Nouveau Magasin</label>
                    <input type="text" id="inShop" placeholder="Nom..." list="sharedShopsList">
                    <datalist id="sharedShopsList"></datalist>
                </div>
                <button class="btn btn-blue" onclick="addShop()">OK</button>
            </div>
            <div class="input-row">
                <div class="col">
                    <label>Article</label>
                    <input type="text" id="inItem" placeholder="Saisir un produit..." oninput="doSuggest(this.value)">
                    <div id="suggestBox"></div>
                </div>
                <div class="col" style="flex:0 0 140px">
                    <label>Magasin</label>
                    <select id="selShop" onchange="render()"></select>
                </div>
                <button class="btn btn-ok" onclick="addItem()">OK</button>
            </div>
        </div>
        
        <div class="footer-btns" style="display:flex; gap:5px; padding:0 8px 8px 8px; flex-wrap:wrap;">
            <button class="btn btn-gray" style="background:var(--gray-dark); flex:1" onclick="toggleCat(true)">📖 Catalogue</button>
            <button class="btn btn-orange" onclick="location.reload()">🔄 Actualiser</button>
            <button class="btn" style="background:var(--danger); flex:1" onclick="clearAll()">🗑️ Vider Listes</button>
            <button class="btn" style="background:#7f8c8d;" onclick="firebase.auth().signOut()">🚪 Déco.</button>
        </div>
    </div>

    <div class="scrollable-content" id="contentZone"></div>
</div>

<!-- MODAL CATALOGUE COMPARATEUR -->
<div id="modalCat" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10001; display: none; align-items: center; justify-content: center;">
    <div style="background: white; width: 95%; max-width: 500px; max-height: 85vh; border-radius: 10px; display: flex; flex-direction: column;">
        <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <strong>📖 Catalogue & Comparateur</strong>
            <button onclick="toggleCat(false)" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
        </div>
        
        <!-- Zone Ajout Direct -->
        <div style="background:#f9f9f9; padding:10px; border-bottom:1px solid #eee;">
            <div style="font-size:0.7rem; font-weight:bold; color:#555; margin-bottom:5px;">Ajouter directement au catalogue :</div>
            <div style="display:flex; gap:5px; flex-wrap:wrap;">
                <input type="text" id="catNewName" placeholder="Produit..." style="flex:2; min-width:100px; padding:8px; border:1px solid #ccc; border-radius:4px;">
                <select id="catNewShop" style="flex:1; min-width:100px; padding:8px; border:1px solid #ccc; border-radius:4px;"></select>
                <input type="number" id="catNewPrice" placeholder="Prix" style="flex:1; max-width:70px; padding:8px; border:1px solid #ccc; border-radius:4px;" step="0.01">
                <button class="btn btn-ok" onclick="addDirectToCat()" style="padding:8px 15px;">+</button>
            </div>
        </div>

        <!-- Zone Recherche -->
        <div style="padding:10px; border-bottom:1px solid #eee; background:white;">
            <input type="text" id="catSearch" placeholder="🔍 Rechercher un produit..." oninput="renderCatList()" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <!-- Liste Catalogue -->
        <div id="catBody" style="overflow-y: auto; padding: 10px; flex-grow: 1; background:white;"></div>
    </div>
</div>

<script>
    // --- PWA DYNAMIQUE ---
    (function initPWA() {
        const manifest = {
            "name": "Mes Courses Pro", "short_name": "Courses Pro", "start_url": window.location.href.split('?')[0],
            "display": "standalone", "background_color": "#f8f9fa", "theme_color": "#2c3e50",
            "icons": [{ "src": "data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2327ae60'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🛒</text></svg>", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }]
        };
        const link = document.createElement('link'); link.rel = 'manifest';
        link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'}));
        document.head.appendChild(link);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(new Blob(["self.addEventListener('fetch', function(e) {});"], {type: 'application/javascript'}))).catch(()=>{});
        }
    })();

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDageL5yxmvfwQmoPLkBdy1Q86X0uVVxmA",
      authDomain: "courses-a9c65.firebaseapp.com",
      projectId: "courses-a9c65",
      storageBucket: "courses-a9c65.firebasestorage.app",
      messagingSenderId: "847747938532",
      appId: "1:847747938532:web:6754196393d36588bc54f1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const fs = firebase.firestore();

    let currentUser = null;
    let authMode = 'login';
    let userDb = { shops: [], budget: 0 };
    let sharedCatalogue = [];
    let sharedShops = [];

    // --- AUTHENTIFICATION ---
    function setAuthMode(mode) {
        authMode = mode;
        document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
        document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
        document.getElementById('authTitle').innerText = mode === 'login' ? 'Connexion' : 'Inscription';
        document.getElementById('btnForgot').style.display = mode === 'login' ? 'block' : 'none';
    }

    function handleAuth() {
        const e = document.getElementById('authEmail').value.trim();
        const p = document.getElementById('authPassword').value;
        if(!e || !p) return alert("Champs requis.");
        if (authMode === 'login') auth.signInWithEmailAndPassword(e, p).catch(err => alert("Erreur : " + err.message));
        else auth.createUserWithEmailAndPassword(e, p).catch(err => alert("Erreur : " + err.message));
    }

    function handleForgotPassword() {
        const e = document.getElementById('authEmail').value.trim();
        if(!e) return alert("Saisissez votre e-mail d'abord.");
        auth.sendPasswordResetEmail(e).then(() => alert("E-mail envoyé !")).catch(err => alert("Erreur : " + err.message));
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
            
            fs.collection('users_data').doc(user.uid).onSnapshot(doc => {
                if (doc.exists) userDb = doc.data();
                else { userDb = { shops: [], budget: 0 }; fs.collection('users_data').doc(user.uid).set(userDb); }
                render();
            });

            fs.collection('global_catalogue').onSnapshot(snapshot => {
                sharedCatalogue = [];
                snapshot.forEach(doc => sharedCatalogue.push({ id: doc.id, ...doc.data() }));
                // Met à jour la modale si elle est ouverte
                if(document.getElementById('modalCat').style.display === 'flex') renderCatList();
            });

            fs.collection('global_shops').onSnapshot(snapshot => {
                sharedShops = [];
                const dl = document.getElementById('sharedShopsList');
                dl.innerHTML = "";
                snapshot.forEach(doc => {
                    const sName = doc.data().name;
                    sharedShops.push(sName);
                    dl.innerHTML += `<option value="${sName}">`;
                });
            });

        } else {
            currentUser = null;
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }
    });

    // --- DATA MANAGEMENT ---
    function cloudSave() {
        if (!currentUser) return;
        const scrollPos = document.getElementById('contentZone').scrollTop;
        fs.collection('users_data').doc(currentUser.uid).set(userDb).then(() => { document.getElementById('contentZone').scrollTop = scrollPos; });
    }

    function updateSharedCatalogue(itemName, shopName, price) {
        if (!itemName) return;
        const normalized = itemName.trim();
        const docId = normalized.toLowerCase().replace(/[^a-z0-9]/g, "_");
        fs.collection('global_catalogue').doc(docId).get().then(doc => {
            let pricesObj = {};
            if (doc.exists) pricesObj = doc.data().prices || {};
            if (shopName) pricesObj[shopName] = parseFloat(price) || 0;
            fs.collection('global_catalogue').doc(docId).set({ name: normalized, prices: pricesObj }, { merge: true });
        });
    }

    function upBudget(v) { userDb.budget = parseFloat(v) || 0; cloudSave(); }
    
    function addShop() { 
        const n = document.getElementById('inShop').value.trim(); 
        if(n) { 
            if (!userDb.shops.find(s => s.name.toLowerCase() === n.toLowerCase())) userDb.shops.push({ id: Date.now(), name: n, items: [] }); 
            const docId = n.toLowerCase().replace(/[^a-z0-9]/g, "_");
            fs.collection('global_shops').doc(docId).set({ name: n }, { merge: true });
            document.getElementById('inShop').value = ""; cloudSave(); 
        } 
    }
    
    function addItem(forcedName = null) {
        const n = forcedName || document.getElementById('inItem').value.trim();
        const sId = document.getElementById('selShop').value;
        if(!n || !sId) { if(forcedName) alert("Choisissez un magasin avant !"); return; }
        
        const shop = userDb.shops.find(s => s.id == sId);
        const catItem = sharedCatalogue.find(c => c.name.toLowerCase() === n.toLowerCase());
        
        let targetPrice = 0;
        if (catItem && catItem.prices && catItem.prices[shop.name]) targetPrice = catItem.prices[shop.name];

        shop.items.push({ id: Date.now(), name: n, qty: 1, price: targetPrice, promo: 0, checked: false });
        if(!catItem) updateSharedCatalogue(n, shop.name, 0);
        
        document.getElementById('inItem').value = ""; document.getElementById('suggestBox').style.display = 'none';
        cloudSave();
    }

    function doSuggest(v) {
        const box = document.getElementById('suggestBox');
        if(v.length < 1) { box.style.display = 'none'; return; }
        const hits = sharedCatalogue.filter(c => c.name.toLowerCase().includes(v.toLowerCase()));
        if(!hits.length) { box.style.display = 'none'; return; }
        
        const currentShopId = document.getElementById('selShop').value;
        const currentShop = userDb.shops.find(s => s.id == currentShopId);
        
        box.innerHTML = hits.map(h => {
            const shopPrice = (currentShop && h.prices && h.prices[currentShop.name]) ? h.prices[currentShop.name] : 0;
            return `<div class="s-item" onclick="addItem('${h.name.replace(/'/g, "\\'")}')"><span>${h.name}</span><b>${shopPrice > 0 ? shopPrice.toFixed(2)+'€' : '-- €'}</b></div>`;
        }).join('');
        box.style.display = 'block';
    }

    function edit(sId, iId, task, val) {
        const s = userDb.shops.find(x => x.id == sId);
        const it = s.items.find(x => x.id == iId);
        if(task === 'qty') it.qty = Math.max(0, parseFloat((it.qty + val).toFixed(2)));
        if(task === 'qty_m') it.qty = Math.max(0, parseFloat(val) || 0);
        if(task === 'check') it.checked = !it.checked;
        if(task === 'name') { const newN = prompt("Nom de l'article :", it.name); if(newN && newN.trim()) it.name = newN.trim(); }
        if(task === 'price') { it.price = parseFloat(val) || 0; updateSharedCatalogue(it.name, s.name, it.price); }
        if(task === 'promo') it.promo = parseFloat(val) || 0;
        if(task === 'del') s.items = s.items.filter(x => x.id != iId);
        cloudSave();
    }

    // --- MODALE CATALOGUE ET COMPARATEUR ---
    function toggleCat(show) {
        const m = document.getElementById('modalCat');
        if(show) {
            // Remplir la liste des magasins pour l'ajout direct
            const shopSelect = document.getElementById('catNewShop');
            shopSelect.innerHTML = '<option value="">Magasin...</option>' + sharedShops.map(s => `<option value="${s}">${s}</option>`).join('');
            
            document.getElementById('catSearch').value = ""; // Reset recherche
            renderCatList();
            m.style.display = 'flex';
        } else {
            m.style.display = 'none';
        }
    }

    function addDirectToCat() {
        const n = document.getElementById('catNewName').value.trim();
        const s = document.getElementById('catNewShop').value;
        const p = parseFloat(document.getElementById('catNewPrice').value) || 0;
        
        if(!n) return alert("Le nom du produit est requis.");
        updateSharedCatalogue(n, s, p);
        
        document.getElementById('catNewName').value = ""; 
        document.getElementById('catNewPrice').value = "";
    }

    function renderCatList() {
        const b = document.getElementById('catBody');
        const searchInput = document.getElementById('catSearch').value.toLowerCase();
        
        b.innerHTML = "";
        
        let filteredList = sharedCatalogue;
        if(searchInput) {
            filteredList = sharedCatalogue.filter(c => c.name.toLowerCase().includes(searchInput));
        }

        if (filteredList.length === 0) {
            b.innerHTML = "<div style='text-align:center; padding:20px; color:#999;'>Aucun article trouvé.</div>";
            return;
        }

        filteredList.sort((a,b) => a.name.localeCompare(b.name)).forEach((c) => {
            const pricesObj = c.prices || {};
            const shops = Object.keys(pricesObj);
            
            // Calcul du prix le moins cher (> 0)
            let minPrice = Infinity;
            shops.forEach(shop => {
                if(pricesObj[shop] > 0 && pricesObj[shop] < minPrice) minPrice = pricesObj[shop];
            });

            // Création de la liste des prix avec surbrillance
            let pricesHtml = shops.map(shop => {
                const p = pricesObj[shop];
                if(p === 0) return '';
                const isMin = (p === minPrice);
                const style = isMin ? 'color:var(--primary); font-weight:bold;' : 'color:#555;';
                const badge = isMin ? ' <span style="background:var(--primary); color:white; padding:2px 5px; border-radius:4px; font-size:0.6rem; margin-left:5px;">Moins cher</span>' : '';
                return `<li style="margin-bottom:3px; ${style}">${shop} : ${p.toFixed(2)}€${badge}</li>`;
            }).join('');

            b.innerHTML += `<div style="padding:12px 10px; border-bottom:1px solid #eee;">
                <div style="font-weight:bold; color:var(--dark); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:1.05rem;">${c.name}</span>
                    <button onclick="delCatItem('${c.id}')" style="color:var(--danger); border:none; background:none; cursor:pointer; font-size:0.8rem; padding:5px;">🗑️ Supprimer</button>
                </div>
                <ul style="margin:8px 0 0 15px; padding:0; font-size:0.85rem; list-style-type:square;">
                    ${pricesHtml || '<li style="color:#999;">Aucun prix enregistré</li>'}
                </ul>
            </div>`;
        });
    }

    function delCatItem(docId) {
        if(confirm("Attention : Supprimer définitivement cet article du catalogue pour tout le monde ?")) {
            fs.collection('global_catalogue').doc(docId).delete();
        }
    }

    // --- RENDU PRINCIPAL ---
    function clearShop(sId) { if(confirm("Vider ce magasin ?")) { userDb.shops.find(x => x.id == sId).items = []; cloudSave(); } }
    function delShop(id) { if(confirm("Supprimer ce magasin ?")) { userDb.shops = userDb.shops.filter(s => s.id != id); cloudSave(); } }
    function clearAll() { if(confirm("Vider toutes les listes ?")) { userDb.shops.forEach(s => s.items = []); cloudSave(); } }

    function render() {
        const zone = document.getElementById('contentZone');
        const sel = document.getElementById('selShop');
        const curS = sel.value;
        zone.innerHTML = "";
        sel.innerHTML = userDb.shops.length ? "" : '<option value="">Magasin...</option>';
        document.getElementById('inBudget').value = userDb.budget || 0;

        let tG = 0, cG = 0;
        userDb.shops.forEach(s => {
            const opt = document.createElement('option'); opt.value = s.id; opt.textContent = s.name; if(s.id == curS) opt.selected = true; sel.appendChild(opt);
            let sSum = 0, sCheck = 0;
            let itemsHtml = s.items.map(it => {
                const activePrice = (it.promo > 0) ? it.promo : it.price;
                const sub = it.qty * activePrice;
                tG += sub; if(it.checked) cG += sub; sSum += sub; if(it.checked) sCheck += sub;
                const isMobile = window.innerWidth < 750;
                
                const tools = `
                    <div class="qty-ctrl"><button class="btn-q" onclick="edit(${s.id}, ${it.id}, 'qty', -1)">-</button><input type="number" step="any" class="in-q" value="${it.qty}" onchange="edit(${s.id}, ${it.id}, 'qty_m', this.value)"><button class="btn-q" onclick="edit(${s.id}, ${it.id}, 'qty', 1)">+</button></div>
                    <div style="display:flex; flex-direction:column;"><label style="font-size:0.45rem; color:#999">Enseigne (${s.name})</label><input type="number" class="in-p" value="${it.price||''}" onblur="edit(${s.id}, ${it.id}, 'price', this.value)"></div>
                    <div style="display:flex; flex-direction:column;"><label style="font-size:0.45rem; color:var(--promo-color)">Promo</label><input type="number" class="in-p in-promo" value="${it.promo||''}" onblur="edit(${s.id}, ${it.id}, 'promo', this.value)"></div>
                    <div class="row-total">${sub.toFixed(2)}€</div>`;

                if(!isMobile) {
                    return `<div class="item-row ${it.checked ? 'is-checked' : ''}">
                        <input type="checkbox" ${it.checked ? 'checked' : ''} onchange="edit(${s.id}, ${it.id}, 'check')">
                        <div class="name" onclick="edit(${s.id}, ${it.id}, 'name')">${it.name}</div>
                        ${tools}
                        <button class="btn-del" onclick="edit(${s.id}, ${it.id}, 'del')">✕</button>
                    </div>`;
                } else {
                    return `<div class="item-row ${it.checked ? 'is-checked' : ''}">
                        <div class="mobile-top-line">
                            <input type="checkbox" ${it.checked ? 'checked' : ''} onchange="edit(${s.id}, ${it.id}, 'check')">
                            <div class="name" onclick="edit(${s.id}, ${it.id}, 'name')">${it.name}</div>
                            <button class="btn-del" onclick="edit(${s.id}, ${it.id}, 'del')">✕</button>
                        </div>
                        <div class="mobile-bottom-line">${tools}</div>
                    </div>`;
                }
            }).join('');
            zone.innerHTML += `<div class="shop-area"><div class="shop-title-bar"><strong>${s.name}</strong><div style="display:flex; gap:5px; align-items:center;"><div class="badge bg-gray">${sSum.toFixed(2)}€</div><div class="badge bg-green">🛒 ${sCheck.toFixed(2)}€</div><button onclick="clearShop(${s.id})" style="background:none; border:none; color:var(--orange); cursor:pointer; font-size:1.1rem">🗑️</button><button class="btn-del" style="font-size:1rem" onclick="delShop(${s.id})">✕</button></div></div><div>${itemsHtml || '<div style="padding:15px; text-align:center; color:#999; font-size:0.8rem;">Vide</div>'}</div></div>`;
        });
        const rem = userDb.budget - cG; document.getElementById('outTotal').innerText = tG.toFixed(2) + " €"; document.getElementById('outChecked').innerText = cG.toFixed(2) + " €";
        const oR = document.getElementById('outRest'); oR.innerText = rem.toFixed(2) + " €"; oR.style.color = rem < 0 ? "red" : "#2ecc71";
    }
</script>
</body>
</html>
